# calendar_selfplay — Phase 5 training run: ONE shared PPO policy drives a FIELD of N cars on a
# shared circuit, vectorized PettingZoo -> SuperSuit -> Stable-Baselines3 (parameter sharing).
# Extends calendar_dynamic (same DYNAMIC physics + grip pipeline + ObservationV2 length 22 +
# reward_v2 + circuit pool + pool-widening curriculum). The observation is UNCHANGED
# (OBS_VERSION = 2) — no car sees another this phase (Phase 6 adds the nearby-car block) — so the
# Phase 4 generalist warm-starts directly as the shared brain:
#
#   .venv/Scripts/python.exe -m f1rl.train.selfplay --config calendar_selfplay \
#       --resume runs/<calendar_dynamic_run>/checkpoints/best
#
# Field size (grid.n_agents) is a PER-RUN CONSTANT (it sets the vec-env width n_agents*n_copies),
# NOT a curriculum knob. Grow the field across warm-started runs:
#   2-car run  --resume <phase4>      then
#   4-car run  --resume <2-car run>   then ... up to 22 where compute allows.
# The circuit-pool widening below STAYS an in-place curriculum knob (Phase 4, unchanged).
#
# This file IS the source of truth for the run: every value lives here, never in logic. SI units.

seed: 42

# track_id is the eval circuit and the single-circuit fallback; must be in the pool.
track_id: red_bull_ring

# --- Phase 5: the field (per-run constant) --------------------------------------------
grid:
  n_agents: 2              # field size for THIS run (warm-start a larger run to grow it)
  reset_mode: scattered    # train: random centerline idx per car (state-space coverage)
  grid_spacing_m: 12.0
  grid_lateral_m: 3.0
  team_colors:
    - "#e10600"
    - "#00d2be"
    - "#0600ef"
    - "#ff8700"
    - "#006f62"
    - "#2b4562"
    - "#900000"
    - "#005aff"
    - "#ffffff"
    - "#358c75"
    - "#c92d4b"

# --- Phase 5: SuperSuit vectorization -------------------------------------------------
selfplay:
  n_copies: 2              # parallel copies of the N-car field; vec width = n_agents * n_copies
  num_cpus: 0              # 0 => in-process (deterministic; raise for throughput on many cores)

# --- Phase 4: the circuit pool (built data/tracks/<id>.npz ids only) -------------------
circuits:
  pool:
    - red_bull_ring
    - monza
    - catalunya
    - silverstone
    - bahrain
    - cota
    - hungaroring
    - interlagos
    - albert_park
    - baku
    - jeddah
    - las_vegas
    - lusail
    - marina_bay
    - mexico_city
    - miami
    - monaco
    - montreal
    - shanghai
  sampling: uniform
  weights: null
  pin_per_worker: false

# --- training device + parallelism ----------------------------------------------------
device: cpu
total_timesteps: 6000000

# --- PPO hyperparameters (Stable-Baselines3 MlpPolicy) --------------------------------
ppo:
  n_steps: 2048
  batch_size: 256
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  ent_coef: 0.0
  vf_coef: 0.5
  learning_rate: 0.0003
  clip_range: 0.2
  max_grad_norm: 0.5

# --- sim loop timing ------------------------------------------------------------------
sim:
  control_hz: 20
  substeps: 5
  dt_physics: 0.01
  grip: 1.0

# --- physics: DYNAMIC bicycle + friction circle (unchanged from Phase 4) ---------------
physics:
  model: dynamic
  wheelbase: 3.6
  mass: 798.0
  max_steer_deg: 18.0
  max_engine_force: 14500.0
  max_brake_force: 29000.0
  drag_coeff: 0.70
  rolling_coeff: 0.015
  yaw_inertia: 1200.0
  cg_front_ratio: 0.54
  cornering_stiffness_front: 180000.0
  cornering_stiffness_rear: 200000.0
  downforce_coeff: 6.5
  wear_rate: 0.0
  wear_slip_ref: 1.0
  v_blend: 3.0
  v_eps: 0.5

# --- grip pipeline: tires / weather / surface (unchanged from Phase 4) -----------------
tires:
  mu_base: 1.95
  compound_grip: [1.00, 0.97, 0.94, 0.88, 0.82]
  compound_wear_falloff: [0.30, 0.22, 0.16, 0.20, 0.20]
  start_compound: 0

weather:
  condition: dry
  dry_factor: 1.0
  damp_factor: 0.8
  wet_factor: 0.6
  p_wet: 0.25

surface:
  asphalt: 1.0
  kerb: 0.9
  grass: 0.4
  gravel: 0.3

# --- curriculum: WIDEN the pool easy -> full calendar (IN-PLACE; field size is NOT here) -
curriculum:
  enabled: true
  stages:
    - start_step: 0
      circuits: [red_bull_ring, monza]
      mu_base: 2.30
      wear_rate: 0.0
      weather: dry
    - start_step: 1000000
      circuits: [red_bull_ring, monza, catalunya, silverstone, bahrain, cota]
      mu_base: 1.95
      wear_rate: 0.0
      weather: dry
    - start_step: 3000000
      circuits: []
      mu_base: 1.95
      wear_rate: 0.0
      weather: dry

# --- ObservationV2 (OBS_VERSION = 2, length 22) — UNCHANGED ---------------------------
obs:
  ref_speed: 92.0
  lookahead_m: [10, 25, 50, 100, 150]
  beam_angles_deg: [-90, -60, -30, 0, 30, 60, 90]
  beam_max: 60.0
  curvature_scale: 50.0

# --- RewardV2 — unchanged (per-car progress core; no racing-interaction rewards) -------
reward:
  version: 2
  w_progress: 1.0
  w_offtrack: 1.0
  w_step: 0.05
  w_reverse: 2.0
  offtrack_soft_m: 2.0
  offtrack_exp: 2.0
  w_slip: 0.0
  slip_threshold: 0.20

# --- env limits / termination + VecNormalize knobs ------------------------------------
env:
  target_laps: 1
  max_steps: 4000
  offtrack_limit_m: 12.0
  wrong_way_steps: 40
  wrong_way_ds_m: -0.05
  start_speed: 0.0
  start_randomize: true
  failure_reward: -10.0
  norm_reward: true
  clip_obs: 10.0
  clip_reward: 10.0
  norm_gamma: 0.99

# --- eval / checkpoint cadence (in training steps) ------------------------------------
eval:
  eval_freq: 50000
  n_eval_episodes: 1
  deterministic: true
  video_fps: 20
  record_video: true

checkpoint:
  checkpoint_freq: 50000
  keep_last_k: 3
  keep_best: true
  dir: checkpoints

# --- Weights & Biases logging ---------------------------------------------------------
wandb:
  project: f1rl-phase5
  entity: null
  mode: online
  group: calendar_selfplay
  tags: [phase-5, many-cars, selfplay, supersuit, ppo]
