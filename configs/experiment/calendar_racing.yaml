# calendar_racing — Phase 6 training run: ONE shared PPO policy RACES a FIELD of N cars on a
# shared circuit. Extends calendar_selfplay (same DYNAMIC physics + grip pipeline + circuit pool +
# self-play SuperSuit->SB3 stack) and turns the parade into a race:
#
#   1. ObservationV3 (OBS_VERSION = 3, length 22 + K*5 = 42): the unchanged track prefix [0:22]
#      plus the K-nearest-cars neighbor block at the tail (obs.k_neighbors / neighbor_range_m).
#   2. collision: a field-level two-disc collision pass (PhysicsModel.step stays pure).
#   3. reward_v3: the reward_v2 core + a graded contact penalty + a zero-sum overtake/defend term.
#   4. a coexist -> race curriculum: ramp w_contact then w_overtake in place.
#
# The obs bumped 2 -> 3, so a Phase 5 (v2) checkpoint cannot be silently --resume'd; bring the
# competent driver across with the GROWN warm start (input-layer transplant):
#
#   .venv/Scripts/python.exe -m f1rl.train.selfplay --config calendar_racing \
#       --warm-start runs/<calendar_selfplay_run>/checkpoints/best
#
# Field size (grid.n_agents) stays a PER-RUN CONSTANT grown across warm-started runs (2 -> 4 -> 22).
# Reward balance (w_contact vs w_overtake) is the budgeted core of this phase — every weight here.
# This file IS the source of truth for the run: every value lives here, never in logic. SI units.

seed: 42

track_id: red_bull_ring

# --- the field (per-run constant) -----------------------------------------------------
grid:
  n_agents: 2
  reset_mode: scattered
  grid_spacing_m: 12.0
  grid_lateral_m: 3.0
  team_colors:
    - "#e10600"
    - "#00d2be"
    - "#0600ef"
    - "#ff8700"
    - "#006f62"
    - "#2b4562"
    - "#900000"
    - "#005aff"
    - "#ffffff"
    - "#358c75"
    - "#c92d4b"

selfplay:
  n_copies: 2
  num_cpus: 0

# --- Phase 6: field-level collisions (two discs/car; PhysicsModel.step untouched) ------
collision:
  enabled: true
  body: two_disc
  disc_radius_m: 1.0
  disc_offset_m: 1.25
  restitution: 0.1
  friction: 0.3
  push_fraction: 1.0
  crashout_enabled: false       # opt-in; turn on once the racing is stable
  crashout_closing_speed_mps: 25.0

# --- the circuit pool (built data/tracks/<id>.npz ids only) ----------------------------
circuits:
  pool:
    - red_bull_ring
    - monza
    - catalunya
    - silverstone
    - bahrain
    - cota
    - hungaroring
    - interlagos
    - albert_park
    - baku
    - jeddah
    - las_vegas
    - lusail
    - marina_bay
    - mexico_city
    - miami
    - monaco
    - montreal
    - shanghai
  sampling: uniform
  weights: null
  pin_per_worker: false

device: cpu
total_timesteps: 8000000

ppo:
  n_steps: 2048
  batch_size: 256
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  ent_coef: 0.0
  vf_coef: 0.5
  learning_rate: 0.0003
  clip_range: 0.2
  max_grad_norm: 0.5

sim:
  control_hz: 20
  substeps: 5
  dt_physics: 0.01
  grip: 1.0

physics:
  model: dynamic
  wheelbase: 3.6
  mass: 798.0
  max_steer_deg: 18.0
  max_engine_force: 14500.0
  max_brake_force: 29000.0
  drag_coeff: 0.70
  rolling_coeff: 0.015
  yaw_inertia: 1200.0
  cg_front_ratio: 0.54
  cornering_stiffness_front: 180000.0
  cornering_stiffness_rear: 200000.0
  downforce_coeff: 6.5
  wear_rate: 0.0
  wear_slip_ref: 1.0
  v_blend: 3.0
  v_eps: 0.5

tires:
  mu_base: 1.95
  compound_grip: [1.00, 0.97, 0.94, 0.88, 0.82]
  compound_wear_falloff: [0.30, 0.22, 0.16, 0.20, 0.20]
  start_compound: 0

weather:
  condition: dry
  dry_factor: 1.0
  damp_factor: 0.8
  wet_factor: 0.6
  p_wet: 0.25

surface:
  asphalt: 1.0
  kerb: 0.9
  grass: 0.4
  gravel: 0.3

# --- curriculum: coexist -> race (in-place reward-weight ramp) + pool widening ----------
# Field-size scaling stays CROSS-RUN (per-run grid.n_agents). w_contact comes on first so the
# warm-started driver learns to coexist without ramming; w_overtake ramps up afterward so it
# learns to fight for position. Reward weights are the most-iterated values in the project.
curriculum:
  enabled: true
  stages:
    - start_step: 0
      circuits: [red_bull_ring, monza]
      mu_base: 2.30
      wear_rate: 0.0
      weather: dry
      w_contact: 0.5            # learn to coexist (penalize contact) before fighting
      w_overtake: 0.0
    - start_step: 1500000
      circuits: [red_bull_ring, monza, catalunya, silverstone, bahrain, cota]
      mu_base: 1.95
      wear_rate: 0.0
      weather: dry
      w_contact: 0.5
      w_overtake: 0.5           # start rewarding genuine wheel-to-wheel swaps
    - start_step: 3500000
      circuits: []
      mu_base: 1.95
      wear_rate: 0.0
      weather: dry
      w_contact: 0.4
      w_overtake: 1.0           # full racing pressure across the whole calendar

# --- ObservationV3 (OBS_VERSION = 3, length 22 + K*5) ----------------------------------
obs:
  ref_speed: 92.0
  lookahead_m: [10, 25, 50, 100, 150]
  beam_angles_deg: [-90, -60, -30, 0, 30, 60, 90]
  beam_max: 60.0
  curvature_scale: 50.0
  k_neighbors: 4                # K nearest cars in the neighbor block (per-neighbor F = 5)
  neighbor_range_m: 50.0        # sensing range R (m)
  neighbor_vref: 92.0           # m/s; normalizes relative velocity (dv / vref)

# --- RewardV3 — reward_v2 core + contact penalty + zero-sum overtake/defend -------------
# These weights are the curriculum's starting point (the stages above ramp them in place).
reward:
  version: 3
  w_progress: 1.0
  w_offtrack: 1.0
  w_step: 0.05
  w_reverse: 2.0
  offtrack_soft_m: 2.0
  offtrack_exp: 2.0
  w_slip: 0.0
  slip_threshold: 0.20
  w_contact: 0.5
  contact_soft_mps: 5.0
  contact_exp: 2.0
  w_contact_fault: 0.0
  w_overtake: 0.0
  overtake_battle_range_m: 20.0
  w_gap: 0.0

env:
  target_laps: 1
  max_steps: 4000
  offtrack_limit_m: 12.0
  wrong_way_steps: 40
  wrong_way_ds_m: -0.05
  start_speed: 0.0
  start_randomize: true
  failure_reward: -10.0
  norm_reward: true
  clip_obs: 10.0
  clip_reward: 10.0
  norm_gamma: 0.99

eval:
  eval_freq: 50000
  n_eval_episodes: 1
  deterministic: true
  video_fps: 20
  record_video: true

checkpoint:
  checkpoint_freq: 50000
  keep_last_k: 3
  keep_best: true
  dir: checkpoints

wandb:
  project: f1rl-phase6
  entity: null
  mode: online
  group: calendar_racing
  tags: [phase-6, racing, collisions, selfplay, supersuit, ppo]
