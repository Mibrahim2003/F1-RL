# Global defaults (all phases). Every tunable constant lives here or in configs/track/ — none in
# logic. All values are SI (meters, m/s, radians-from-degrees-where-noted, seconds, newtons, kg).
# The kinematic/Phase-1 blocks and the Phase-3a/3b blocks (obs, reward, grip pipeline,
# curriculum) all live here; experiment configs in configs/experiment/ override per run.

seed: 42

track_id: oval  # selects configs/track/<track_id>.yaml, merged in under `track:`

# --- Phase 4: circuit pool (per-episode sampling). Empty pool => single-track_id fallback ---
# The env samples one circuit per reset from `pool` (built data/tracks/<id>.npz ids only) using
# the env RNG, so the draw is reproducible from the run seed. Each id's pole is resolved from
# its configs/track/<id>.yaml. Default empty => Phase 3b single-circuit behavior preserved.
circuits:
  pool: []                 # e.g. [red_bull_ring, monza, catalunya]; [] => use track_id only
  sampling: uniform        # uniform | weighted
  weights: null            # optional {id: w} for weighted sampling; null => uniform
  pin_per_worker: false    # fallback: pin each worker to one drawn pool circuit for its life

# --- Phase 5: many cars on track (RacingParallelEnv) ----------------------------------
# The field is N homogeneous cars on ONE shared circuit (read-only Track/EdgeCache/pole),
# each with its OWN CarState + LapTimer. The observation is UNCHANGED (OBS_VERSION = 2): no
# car sees another this phase. `n_agents` is a PER-RUN constant (it sets the vec-env width),
# NOT a curriculum knob — grow the field by warm-starting successive runs (2 -> 4 -> 22).
# A default of 1 reproduces the single-car path (RacingEnv) exactly.
grid:
  n_agents: 1              # field size (per-run constant; >=1)
  reset_mode: scattered    # scattered (train: random idx per car) | grid (eval/demo: slots @ S/F)
  grid_spacing_m: 12.0     # arc-length gap between grid rows (grid mode); SI meters
  grid_lateral_m: 3.0      # lateral stagger of the two grid columns (grid mode); SI meters
  team_colors:             # render only; never seen by the policy
    - "#e10600"
    - "#00d2be"
    - "#0600ef"
    - "#ff8700"
    - "#006f62"
    - "#2b4562"
    - "#900000"
    - "#005aff"
    - "#ffffff"
    - "#358c75"
    - "#c92d4b"

# --- Phase 5: self-play vectorization (SuperSuit -> Stable-Baselines3) -----------------
selfplay:
  n_copies: 2              # SuperSuit parallel copies of the N-car field; vec width = n_agents*n_copies
  num_cpus: 0              # SuperSuit worker processes (0 => in-process, deterministic)

# --- Phase 6: collisions (field-level pass; PhysicsModel.step stays pure) ---------------
# Two discs per car (front + rear, swept along the body axis); contact when any disc-pair gap
# < 2*radius. The pass snapshots post-physics states, computes every pair's correction against
# the snapshot, then applies the sum (order-independent, reproducible from the seed). Default
# `enabled: false` => the Phase 5 blind parade is preserved (no coupling). All SI units.
collision:
  enabled: false           # false => no collision pass (Phase 5 behavior); true => Phase 6 racing
  body: two_disc           # two_disc (default) | disc  (obb = future fidelity upgrade)
  disc_radius_m: 1.0       # per-disc radius (m)
  disc_offset_m: 1.25      # front/rear disc offset along the body axis from car center (m)
  restitution: 0.1         # 0 = fully inelastic, 1 = elastic; F1 contact ~ low
  friction: 0.3            # tangential damping fraction at contact, [0, 1]
  push_fraction: 1.0       # fraction of penetration removed per step (split evenly), [0, 1]
  crashout_enabled: false  # opt-in severe-crash termination (ends the car with failure_reward)
  crashout_closing_speed_mps: 25.0  # closing speed above which a contact ends the car (when on)

sim:
  control_hz: 20          # control step rate (dt_control = 1/20 = 0.05 s)
  substeps: 5             # physics substeps per control step
  dt_physics: 0.01        # 5 * 0.01 = 0.05 s, matches control_hz
  grip: 1.0               # constant grip for the kinematic model

physics:
  model: kinematic        # "kinematic" (Phase 1) | "dynamic" (Part 2); read by make_physics
  wheelbase: 3.6          # m
  mass: 798.0             # kg
  max_steer_deg: 18.0     # steering angle at the wheels, degrees
  max_engine_force: 6000.0    # N  (sets acceleration; with drag sets top speed ~92 m/s)
  max_brake_force: 16000.0    # N
  drag_coeff: 0.70        # N / (m/s)^2  (lumped 0.5 * rho * Cd * A)
  rolling_coeff: 0.015    # dimensionless; rolling resistance = c * m * g
  # --- dynamic-model-only keys (Part 2; read only when model == "dynamic") ---
  yaw_inertia: 1200.0         # Iz, kg m^2
  cg_front_ratio: 0.54        # lf / wheelbase; lr = (1 - ratio) * wheelbase
  cornering_stiffness_front: 180000.0  # Cf, N/rad
  cornering_stiffness_rear: 200000.0   # Cr, N/rad
  downforce_coeff: 4.0        # N / (m/s)^2 (0.5*rho*Cl*A); adds to friction-circle max_force
  wear_rate: 0.0              # tire wear per (slip*speed*dt); 0 disables (early curriculum)
  wear_slip_ref: 1.0          # divides the slip*speed wear load (shapes wear growth)
  v_blend: 3.0                # m/s; below this blend yaw_rate/vy toward the kinematic prediction
  v_eps: 0.5                  # m/s; slip-angle singularity guard (vx_safe = max(vx, v_eps))

server:
  host: "127.0.0.1"
  port: 8000
  recordings_dir: "recordings"
  tracks_dir: "data/tracks"   # cached real-circuit .npz files (built offline)
  checkpoints_dir: "runs"     # root scanned for trained checkpoints (watch-live policy picker)
  calendar_path: "out/calendar_benchmark.json"  # Phase 4 lap-time-vs-pole table (result view)

# --- Observation (OBS_VERSION = 2, length 22) -----------------------------------------
# These keys parameterize the v1 slice (0-14); the v2 tail (wear, compound one-hot, grip)
# is derived from state + the grip pipeline, not from this block. All tunable, SI units.
obs:
  ref_speed: 92.0                 # m/s, normalizes speed (vx / ref_speed); ~kinematic top speed
  lookahead_m: [10, 25, 50, 100, 150]            # 5 curvature-lookahead distances (m)
  beam_angles_deg: [-90, -60, -30, 0, 30, 60, 90]  # 7 rangefinder beams, relative to yaw
  beam_max: 60.0                  # m, beam range; distances normalize by this, clip [0,1]
  curvature_scale: 50.0           # multiplies signed curvature (1/m) into a bounded range
  # --- Phase 6: nearby-car block (ObservationV3 tail; OBS_VERSION = 3) ---
  # K nearest cars, nearest-first, zero-padded, local/relative in the observer body frame.
  # OBS_DIM = 22 + k_neighbors*5. K=0 keeps a length-22 vector (no tail). All SI units.
  k_neighbors: 4                  # K nearest other cars encoded in the tail (per-neighbor F=5)
  neighbor_range_m: 50.0          # sensing range R (m); a car beyond R is not a neighbor
  neighbor_vref: 92.0             # m/s; normalizes relative velocity (dv / vref), clip [-2,2]

# RewardV1 — progress-based, never rewards centerline proximity. Most-iterated weights.
reward:
  version: 1                      # 1 = reward_v1 (Phase 1) | 2 = reward_v2 (Part 2 shaping)
  w_progress: 1.0                 # per meter of forward arc-length progress
  w_offtrack: 1.0                 # scales the graded off-track penalty
  w_step: 0.05                    # small per-step cost, discourages dawdling
  w_reverse: 2.0                  # extra penalty per meter of backward progress
  offtrack_soft_m: 2.0            # meters past the edge over which the penalty ramps up
  offtrack_exp: 2.0               # >1: cheap small excursions, costly deep ones
  w_slip: 0.0                     # v2 only: penalty on excessive slip/spin; 0 keeps behavior ~v1
  slip_threshold: 0.20            # v2 only: |vy/vx| above this is penalized (rad-ish)
  # --- Phase 6: racing terms (reward_v3 = reward_v2 core + contact + zero-sum position) ---
  # All default 0 => reward_v3 reduces to reward_v2 (single-agent / blind field unchanged).
  w_contact: 0.0                  # contact penalty weight: -w_contact * (closing/soft)^exp
  contact_soft_mps: 5.0           # closing-speed scale; a light brush << a hard hit
  contact_exp: 2.0                # >1 makes light contact cheap, heavy contact costly
  w_contact_fault: 0.0            # optional extra share for the car at fault (reserved; default 0)
  w_overtake: 0.0                 # + per place gained / - per place lost (genuine swaps only)
  overtake_battle_range_m: 20.0   # both cars within this total-progress gap to count a swap
  w_gap: 0.0                      # opt-in dense gap-closing shaping (like w_slip; default 0)

# Env limits / termination + VecNormalize knobs.
env:
  target_laps: 1                  # success on completing this many laps (per-track override possible)
  max_steps: 4000                 # truncation step limit (~200 s at 20 Hz)
  offtrack_limit_m: 12.0          # meters past the asphalt edge -> failure termination
  wrong_way_steps: 40             # consecutive backward-progress steps -> wrong-way failure
  wrong_way_ds_m: -0.05           # ds (m) below this counts as going backward
  start_speed: 0.0                # m/s at reset
  start_randomize: true           # random centerline start index (start-state randomization)
  failure_reward: -10.0           # one-off penalty added on a failure termination
  norm_reward: true               # VecNormalize reward normalization
  clip_obs: 10.0                  # VecNormalize obs clip
  clip_reward: 10.0               # VecNormalize reward clip
  norm_gamma: 0.99                # VecNormalize discount (match PPO gamma)

# --- Phase 3b (realistic physics): grip pipeline -------------------------------------
# effective_grip = mu_base * tire(compound, wear) * weather * surface — one scalar gating
# the friction circle. Pure tables (physics/tires.py); the env owns the surface lookup.
tires:
  mu_base: 1.05                   # effective base-grip coefficient (lumps tire + baseline aero;
                                  # NOT a literal road friction value — calibrated per car, see
                                  # TECHNICAL_DESIGN §4). Trained runs override this much higher.
  # per-compound index order matches CarState.compound: 0 soft 1 medium 2 hard 3 inter 4 wet
  compound_grip: [1.00, 0.97, 0.94, 0.88, 0.82]   # soft > medium > hard; inter/wet lower (dry)
  compound_wear_falloff: [0.30, 0.22, 0.16, 0.20, 0.20]  # grip *= (1 - falloff * wear)
  start_compound: 0               # compound set at reset (0 soft)

weather:
  condition: dry                  # dry | damp | wet — live default / episode condition
  dry_factor: 1.0
  damp_factor: 0.8
  wet_factor: 0.6
  p_wet: 0.0                      # P(episode samples wet) when curriculum stage weather = sampled

surface:                          # grip multiplier per surface zone (Phase 2 bands)
  asphalt: 1.0
  kerb: 0.9
  grass: 0.4
  gravel: 0.3

# --- Phase 3b curriculum: ramp conditions by timestep (CurriculumCallback) -------------
curriculum:
  enabled: false                  # default off; rbr_dynamic.yaml turns it on
  stages:
    - start_step: 0
      mu_base: 1.30
      wear_rate: 0.0
      weather: dry
